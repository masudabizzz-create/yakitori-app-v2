name: CI & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # テスト・ビルド（develop = staging / main = 本番）
  # ----------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm run test

      # develop → staging 環境変数 / main → 本番環境変数
      - name: Build (staging)
        if: github.ref == 'refs/heads/develop'
        run: npm run build
        env:
          GITHUB_PAGES: '1'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_STAGING }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_STAGING }}

      - name: Build (production)
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: npm run build
        env:
          GITHUB_PAGES: '1'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ----------------------------------------------------------
  # 本番 DB マイグレーション適用（main への push 時のみ）
  # ----------------------------------------------------------
  migrate:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@2.101.0

      - name: Apply migrations to production
        run: |
          supabase link --project-ref mmquefvklrxjcmoxgvjb
          for f in supabase/migrations/*.sql; do
            echo "Applying: $f"
            supabase db query --linked -f "$f"
          done
          supabase db query --linked "SELECT pg_notify('pgrst', 'reload schema');"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ----------------------------------------------------------
  # GitHub Pages へデプロイ（main への push 時のみ）
  # ----------------------------------------------------------
  deploy:
    needs: [build, migrate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
